name: Deploy to KingHost

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/deploy.lftp << 'LFTP'
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 60
          set net:max-retries 3
          set ftp:charset utf-8
          mirror -R --verbose --parallel=3 --exclude-glob .git --exclude-glob .github . /
          quit
          LFTP
          lftp -u "splendidaembalagens,$FTP_PASSWORD" ftp.splendidaembalagens.com.br -f /tmp/deploy.lftp
