name: Deploy to KingHost

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            set ftp:ssl-allow no;
            set ftp:passive-mode yes;
            set net:timeout 30;
            mirror -R --parallel=5 \
              --exclude .git/ \
              --exclude .github/ \
              --exclude node_modules/ \
              . /;
            quit
          " -u splendidaembalagens,"$FTP_PASSWORD" ftp.splendidaembalagens.com.br
