name: Deploy to KingHost

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-ftp
        run: sudo apt-get install -y git-ftp

      - name: Deploy via git-ftp
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          git ftp push \
            --user splendidaembalagens \
            --passwd "$FTP_PASSWORD" \
            --all \
            ftp://ftp.splendidaembalagens.com.br/www/
