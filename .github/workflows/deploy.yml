name: Deploy to KingHost

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 - << 'PYEOF'
          import ftplib, os, sys

          EXCLUDE = {'.git', '.github', 'node_modules'}
          HOST = 'ftp.splendidaembalagens.com.br'
          USER = 'splendidaembalagens'
          PASSWD = os.environ['FTP_PASSWORD']
          REMOTE_ROOT = '/www'

          ftp = ftplib.FTP_TLS()
          ftp.connect(HOST, 21)
          ftp.login(USER, PASSWD)
          ftp.prot_p()
          ftp.set_pasv(True)
          print('Connected OK')

          def ensure_dir(path):
              try:
                  ftp.mkd(path)
                  print(f'  mkdir {path}')
              except ftplib.error_perm:
                  pass  # already exists

          def upload_dir(local, remote):
              ensure_dir(remote)
              for item in sorted(os.listdir(local)):
                  if item in EXCLUDE:
                      continue
                  lpath = os.path.join(local, item)
                  rpath = remote + '/' + item
                  if os.path.isdir(lpath):
                      upload_dir(lpath, rpath)
                  else:
                      print(f'  upload {rpath}')
                      with open(lpath, 'rb') as f:
                          ftp.storbinary(f'STOR {rpath}', f)

          upload_dir('.', REMOTE_ROOT)
          ftp.quit()
          print('Deploy complete!')
          PYEOF
